services:
  daily-report-viewer:
    build: .
    container_name: daily-report-viewer
    ports:
      - "8081:80"
    volumes:
      - ./report:/app/report   # SQLite DB 및 리포트 디렉토리 마운트
      - ./logs:/app/logs
      - ./config:/app/config   # 최적화 결과(optimized_params.json) 영속화
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
      - REPORT_OUTPUT_DIR=/app/report
    restart: unless-stopped
