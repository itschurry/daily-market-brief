<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="daily-market-brief architecture overview">
  <defs>
    <style>
      .bg { fill:#0b1020; }
      .panel { fill:#131a2a; stroke:#334155; stroke-width:2; rx:18; }
      .panel2 { fill:#0f172a; stroke:#475569; stroke-width:2; rx:18; }
      .title { fill:#e2e8f0; font:700 28px 'Inter', 'Noto Sans KR', sans-serif; }
      .label { fill:#f8fafc; font:700 22px 'Inter', 'Noto Sans KR', sans-serif; }
      .text { fill:#cbd5e1; font:500 18px 'Inter', 'Noto Sans KR', sans-serif; }
      .mini { fill:#94a3b8; font:500 15px 'Inter', 'Noto Sans KR', sans-serif; }
      .line { stroke:#60a5fa; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .line2 { stroke:#34d399; stroke-width:4; fill:none; marker-end:url(#arrow2); }
      .line3 { stroke:#f59e0b; stroke-width:4; fill:none; marker-end:url(#arrow3); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="60" y="60" class="title">daily-market-brief 아키텍처 개요</text>

  <rect class="panel" x="60" y="120" width="230" height="180"/>
  <text x="90" y="165" class="label">사용자 / 운영자</text>
  <text x="90" y="205" class="text">• 브라우저 접속</text>
  <text x="90" y="235" class="text">• API 호출</text>
  <text x="90" y="265" class="text">• 엔진 제어</text>

  <rect class="panel" x="370" y="120" width="270" height="180"/>
  <text x="400" y="165" class="label">apps/web</text>
  <text x="400" y="205" class="text">React + Vite 운영 콘솔</text>
  <text x="400" y="235" class="text">/api 프록시</text>
  <text x="400" y="265" class="text">대시보드 / 리포트 / 엔진 UI</text>

  <rect class="panel" x="720" y="100" width="400" height="220"/>
  <text x="750" y="145" class="label">apps/api</text>
  <text x="750" y="185" class="text">FastAPI + legacy dispatcher</text>
  <text x="750" y="215" class="text">리포트 파이프라인 / 추천 / 비교</text>
  <text x="750" y="245" class="text">모의투자 엔진 / 검증 / 캐시</text>
  <text x="750" y="285" class="text">텔레그램 / 이메일 알림</text>

  <rect class="panel2" x="80" y="420" width="280" height="210"/>
  <text x="110" y="465" class="label">외부 데이터/모델</text>
  <text x="110" y="505" class="text">• OpenAI / Ollama</text>
  <text x="110" y="535" class="text">• FRED / ECOS / DART</text>
  <text x="110" y="565" class="text">• KIS Open API (선택)</text>

  <rect class="panel2" x="450" y="420" width="300" height="210"/>
  <text x="480" y="465" class="label">storage</text>
  <text x="480" y="505" class="text">• reports/  리포트 결과물</text>
  <text x="480" y="535" class="text">• reports DB / explain payload</text>
  <text x="480" y="565" class="text">• logs/ 엔진/주문/계좌 로그</text>

  <rect class="panel2" x="840" y="420" width="280" height="210"/>
  <text x="870" y="465" class="label">운영 실행 방식</text>
  <text x="870" y="505" class="text">• venv 로컬 실행</text>
  <text x="870" y="535" class="text">• docker compose api + web</text>
  <text x="870" y="565" class="text">• scheduler.py / systemd</text>

  <path class="line" d="M290 210 C320 210, 335 210, 370 210"/>
  <path class="line" d="M640 210 C670 210, 690 210, 720 210"/>
  <path class="line2" d="M860 320 C860 360, 930 380, 980 420"/>
  <path class="line2" d="M760 320 C720 360, 670 390, 610 420"/>
  <path class="line3" d="M720 250 C610 300, 430 340, 250 420"/>

  <text x="320" y="195" class="mini">UI 조작</text>
  <text x="655" y="195" class="mini">REST / JSON</text>
  <text x="894" y="385" class="mini">배포</text>
  <text x="686" y="392" class="mini">저장</text>
  <text x="470" y="330" class="mini">데이터 수집 / 모델 호출</text>
</svg>