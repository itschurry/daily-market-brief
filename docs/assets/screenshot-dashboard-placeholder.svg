      .bg{fill:#0f172a}.card{fill:#111827;stroke:#334155;stroke-width:2;rx:16}.soft{fill:#1e293b}.line{fill:#334155}.t1{fill:#e5e7eb;font:700 28px 'Inter','Noto Sans KR',sans-serif}.t2{fill:#cbd5e1;font:600 18px 'Inter','Noto Sans KR',sans-serif}.t3{fill:#94a3b8;font:500 16px 'Inter','Noto Sans KR',sans-serif}.accent{fill:#2563eb}.accent2{fill:#10b981}.accent3{fill:#f59e0b}
    </style>
