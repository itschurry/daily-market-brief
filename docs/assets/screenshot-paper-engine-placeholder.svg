<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="paper engine screenshot placeholder">
  <defs><style>.bg{fill:#0a0f1a}.card{fill:#111827;stroke:#334155;stroke-width:2;rx:16}.txt{fill:#e5e7eb;font:700 28px 'Inter','Noto Sans KR',sans-serif}.sub{fill:#cbd5e1;font:600 18px 'Inter','Noto Sans KR',sans-serif}.muted{fill:#94a3b8;font:500 15px 'Inter','Noto Sans KR',sans-serif}.line{fill:#334155}.green{fill:#22c55e}.red{fill:#ef4444}.amber{fill:#f59e0b}</style></defs>
  <rect class="bg" width="1280" height="720"/>
  <rect x="40" y="40" width="1200" height="640" class="card"/>
  <text x="80" y="95" class="txt">모의투자 엔진 화면 예시 자리</text>
  <text x="80" y="130" class="muted">engine status / cycles / orders / account history 설명용 플레이스홀더</text>
  <rect x="80" y="170" width="320" height="140" class="card"/>
  <rect x="430" y="170" width="320" height="140" class="card"/>
  <rect x="780" y="170" width="320" height="140" class="card"/>
  <text x="110" y="215" class="sub">엔진 상태</text>
  <text x="460" y="215" class="sub">오늘 손익</text>
  <text x="810" y="215" class="sub">현재 에쿼티</text>
  <circle cx="340" cy="240" r="10" class="green"/>
  <circle cx="690" cy="240" r="10" class="amber"/>
  <circle cx="1040" cy="240" r="10" class="red"/>
  <rect x="80" y="345" width="500" height="250" class="card"/>
  <rect x="610" y="345" width="490" height="250" class="card"/>
  <text x="110" y="390" class="sub">사이클 로그</text>
  <text x="640" y="390" class="sub">주문 / 계좌 히스토리</text>
  <rect x="110" y="425" width="420" height="16" class="line"/>
  <rect x="110" y="460" width="390" height="16" class="line"/>
  <rect x="110" y="495" width="440" height="16" class="line"/>
  <rect x="110" y="530" width="360" height="16" class="line"/>
  <rect x="640" y="425" width="420" height="16" class="line"/>
  <rect x="640" y="460" width="390" height="16" class="line"/>
  <rect x="640" y="495" width="440" height="16" class="line"/>
  <rect x="640" y="530" width="360" height="16" class="line"/>
  <text x="420" y="650" class="muted">실제 엔진 운영 캡처로 교체 가능한 자리표시 이미지</text>
</svg>