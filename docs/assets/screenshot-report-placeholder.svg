  <rect x="110" y="420" width="1030" height="28" class="soft"/>
  <rect x="110" y="470" width="1030" height="20" class="line"/>
  <rect x="110" y="510" width="1030" height="20" class="line"/>
  <rect x="110" y="550" width="1030" height="20" class="line"/>
