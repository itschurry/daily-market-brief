<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="report screenshot placeholder">
  <defs><style>.bg{fill:#0b1220}.card{fill:#111827;stroke:#334155;stroke-width:2;rx:16}.soft{fill:#1f2937}.txt{fill:#e5e7eb;font:700 28px 'Inter','Noto Sans KR',sans-serif}.sub{fill:#cbd5e1;font:600 18px 'Inter','Noto Sans KR',sans-serif}.muted{fill:#94a3b8;font:500 15px 'Inter','Noto Sans KR',sans-serif}.line{fill:#334155}.green{fill:#10b981}.yellow{fill:#f59e0b}.blue{fill:#3b82f6}</style></defs>
  <rect class="bg" width="1280" height="720"/>
