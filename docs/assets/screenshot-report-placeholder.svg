  <rect x="110" y="235" width="680" height="16" class="line"/>
  <rect x="110" y="265" width="650" height="16" class="line"/>
  <rect x="110" y="295" width="540" height="16" class="line"/>
  <circle cx="1110" cy="220" r="10" class="yellow"/>
  <circle cx="1110" cy="250" r="10" class="green"/>
  <circle cx="1110" cy="280" r="10" class="blue"/>
  <rect x="80" y="345" width="1090" height="280" class="card"/>
